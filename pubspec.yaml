name: pulsara_kiosk
description: Pulsara Attendance Kiosk — Production Ready

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management + DI + routing
  get: ^4.6.6

  # Networking
  dio: ^5.4.3+1

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Camera & ML
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.11.0
  tflite_flutter: ^0.12.0
  image: ^4.2.0

  # Connectivity & background sync
  connectivity_plus: ^6.0.3
  workmanager: ^0.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  lottie: ^3.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  logger: ^2.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/animations/
